name: RocketSwap Status Monitor

on:
  workflow_run:
    workflows: ["RocketSwap Lockdown Manager"]
    types:
      - completed
  workflow_dispatch:
  push:
    paths:
      - 'lockdown.txt'
      - 'version.txt'
      - 'rlsteambuild.txt'
      - 'supportedbuild'
      - 'gameversion.txt'

permissions:
  contents: read

jobs:
  update_discord_status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read files and update Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOKSTATUS }}
          STATUS_CHANNEL_ID: "1519165596556726432"
          STATUS_MESSAGE_ID: "1519172961108623553"
        run: |
          STATUS=$(cat lockdown.txt | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')

          if [ -f "version.txt" ]; then
            VERSION=$(cat version.txt | tr -d '\n' | tr -d '\r')
          else
            VERSION="Unknown"
          fi

          if [ -f "rlsteambuild.txt" ]; then
            RL_STEAM=$(cat rlsteambuild.txt | tr -d '\n' | tr -d '\r')
          else
            RL_STEAM="Unknown"
          fi

          if [ -f "supportedbuild" ]; then
            SUPP_BUILD=$(cat supportedbuild | tr -d '\n' | tr -d '\r')
          else
            SUPP_BUILD="Unknown"
          fi

          if [ -f "gameversion.txt" ]; then
            GAME_VERSION=$(cat gameversion.txt | tr -d '\n' | tr -d '\r')
          else
            GAME_VERSION="$RL_STEAM"
          fi

          if [ "$STATUS" == "true" ]; then
            # Lockdown is TRUE -> MAINTENANCE/RED
            APP_STATUS="MAINTENANCE"
            COLOR=16711680 # Red
            DETAIL="The mod network is temporarily offline for upgrades."
            IMAGE_URL="https://raw.githubusercontent.com/AC-Storm-YT/RocketSwap_data/refs/heads/main/status/RocketSwap_Maintenance_Banner.png"
          elif [ "$STATUS" == "false" ]; then
            # Lockdown is FALSE -> OPERATIONAL/GREEN
            APP_STATUS="OPERATIONAL"
            COLOR=65280 # Green
            DETAIL="All systems are running normally. Happy modding!"
            IMAGE_URL="https://raw.githubusercontent.com/AC-Storm-YT/RocketSwap_data/refs/heads/main/status/RocketSwap_Operational_Banner.png"
          elif [ "$STATUS" == "update" ]; then
            # Lockdown is UPDATE -> UPDATE REQUIRED/ORANGE
            APP_STATUS="UPDATING"
            COLOR=16753920 # Orange
            DETAIL="RocketSwap requires an update to support the latest Rocket League patch."
            IMAGE_URL="https://raw.githubusercontent.com/AC-Storm-YT/RocketSwap_data/refs/heads/main/status/RocketSwap_Updating_Banner.png"
          else
            APP_STATUS="UNKNOWN"
            COLOR=8421504 # Gray
            DETAIL="lockdown.txt was updated, but the status is unknown: $STATUS"
            IMAGE_URL=""
          fi

          PRODUCT=$'Rocket League\nRocketSwap'
          LATEST_BUILD="$RL_STEAM"
          SUPPORTED_BUILD="$SUPP_BUILD"
          THUMBNAIL_URL="https://raw.githubusercontent.com/AC-Storm-YT/RocketSwap_data/refs/heads/main/status/rl_logo.jpg"

          PAYLOAD=$(jq -n \
            --arg product "$PRODUCT" \
            --arg app "$APP_STATUS" \
            --arg game "$GAME_VERSION" \
            --arg latest "$LATEST_BUILD" \
            --arg supported "$SUPPORTED_BUILD" \
            --arg message "$DETAIL" \
            --arg thumbnail "$THUMBNAIL_URL" \
            --arg image "$IMAGE_URL" \
            --arg footer "RocketSwap Version: $VERSION" \
            --argjson color "$COLOR" \
            '{
              embeds: [({
                color: $color,
                thumbnail: {url: $thumbnail},
                fields: [
                  {name: "Product", value: $product, inline: true},
                  {name: "App Status", value: $app, inline: true},
                  {name: "Game Version", value: $game, inline: true},
                  {name: "Latest Build", value: $latest, inline: true},
                  {name: "Supported Build", value: $supported, inline: true},
                  {name: "Status Message", value: $message, inline: false}
                ],
                footer: {text: $footer}
              } + (if $image != "" then {image: {url: $image}} else {} end))]
            }')

          RESPONSE_FILE=$(mktemp)

          HTTP_STATUS=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X PATCH \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL/messages/$STATUS_MESSAGE_ID")

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Failed to update Discord status message $STATUS_MESSAGE_ID. HTTP $HTTP_STATUS."
            cat "$RESPONSE_FILE"
            exit 1
          fi

          ACTUAL_CHANNEL_ID=$(jq -r '.channel_id // empty' "$RESPONSE_FILE")

          if [ -n "$ACTUAL_CHANNEL_ID" ] && [ "$ACTUAL_CHANNEL_ID" != "$STATUS_CHANNEL_ID" ]; then
            echo "::warning::Status webhook posted to channel $ACTUAL_CHANNEL_ID, expected $STATUS_CHANNEL_ID. Check DISCORD_WEBHOOKSTATUS."
          fi

          echo "Updated Discord status message $STATUS_MESSAGE_ID."
